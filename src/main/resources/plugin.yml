name: OyasaiMusic
version: '${version}'
main: com.github.sahyuya.oyasaiMusic.OyasaiMusic
api-version: '1.21.11'
load: POSTWORLD
depend: [FastAsyncWorldEdit]
softdepend: [Vault, TokenManager, PlaceholderAPI, Essentials, Floodgate]

commands:
  record:
    description: 楽曲録音コマンド
    aliases: [rec]
    usage: |
      /record we grid <BPM>   - FAWEクリップボードからグリッド型録音
      /record we default      - FAWEクリップボードから回路型(レッドストーン)録音
      /record start <1-4>     - 動的録音を開始（引数は量子化グリッドの遅延単位）
      /record stop            - 動的録音を終了して下書き保存
    permission: oyasaimusic.record
  playtest:
    description: 楽曲再生テストコマンド
    usage: |
      /playtest <楽曲ID>      - 指定楽曲を再生
      /playtest stop          - 再生中の楽曲を停止
    permission: oyasaimusic.use

permissions:
  oyasaimusic.admin:
    description: OP専用機能（審査・履歴管理GUI等）へのアクセス
    default: op
  oyasaimusic.record:
    description: 楽曲録音コマンドの使用
    default: true
  oyasaimusic.use:
    description: プレイヤーGUI/物理アイテムの使用
    default: true